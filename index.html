<body>
    <div class="container">
        <h1>LensTracker</h1>
        
        <div id="activeState" class="hidden">
            <div class="status-box">
                <div id="startTimeDisplay">Puestos a las --:--</div>
                <div id="timer">00:00:00</div>
                <p>Tiempo transcurrido</p>
            </div>
            <button class="btn btn-remove" id="btnRemove">Me los saqué</button>
        </div>

        <div id="idleState">
            <p>No tenés los lentes puestos</p>
            <button class="btn btn-put" id="btnPut">Me los puse AHORA</button>
            <input type="time" id="customTime" class="time-input" aria-label="Ingresar hora manual">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

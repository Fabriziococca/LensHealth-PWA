<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>LensTracker</title>

    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">

    <link rel="stylesheet" href="styles.css">

    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div class="container">
        <h1>LensTracker</h1>
        
        <div id="activeState" class="hidden">
            <div class="status-box">
                <div id="startTimeDisplay">Puestos a las --:--</div>
                <div id="timer">00:00:00</div>
                <p>Tiempo transcurrido</p>
            </div>
            <button class="btn btn-remove" id="btnRemove">Me los saqué</button>
        </div>

        <div id="idleState">
            <p>No tenés los lentes puestos</p>
            <button class="btn btn-put" id="btnPut">Me los puse AHORA</button>
            
            <div class="manual-entry">
                <label for="customTime">¿Te los pusiste antes?</label>
                <input type="time" id="customTime" class="time-input">
            </div>
        </div>
    </div>

    <script src="script.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW no registrado', err));
            });
        }
    </script>
</body>
</html>
